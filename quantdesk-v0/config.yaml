# quantdesk configuration
# Set tickers to a non-empty list to load from CSV; leave empty to use synthetic data.
tickers: []

# Universe screening
n_clusters: 3
fdr: 0.10

# Walk-forward windows (trading days)
train_size: 252
test_size: 63

# Pair signal thresholds
signal:
  entry: 2.0
  exit: 0.5
  stop: 4.0
  max_holding: 30

# Per-leg transaction costs (basis points)
cost:
  commission_bps: 1.0
  half_spread_bps: 2.0
  impact_bps: 0.5

# Volatility targeting (applied to regime signal, not directly to book)
vol_target:
  target_vol: 0.10
  max_leverage: 3.0
  vol_floor: 0.03
  rebalance_band: 0.10

# Regime de-grossing parameters
regime_lookback: 252
regime_stress_pct: 0.80
regime_min_scalar: 0.25

# Annualisation (daily bars)
ann_factor: 252.0

# RNG seed for synthetic runs
seed: 42
